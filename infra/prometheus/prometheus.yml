global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'gateway-service'
    static_configs:
      - targets: ['gateway-service:8000']
    metrics_path: '/metrics'

  - job_name: 'agent-config-service'
    static_configs:
      - targets: ['agent-config-service:8001']
    metrics_path: '/metrics'

  - job_name: 'session-service'
    static_configs:
      - targets: ['session-service:8002']
    metrics_path: '/metrics'

  - job_name: 'memory-service'
    static_configs:
      - targets: ['memory-service:8003']
    metrics_path: '/metrics'

  - job_name: 'audit-service'
    static_configs:
      - targets: ['audit-service:8004']
    metrics_path: '/metrics'
